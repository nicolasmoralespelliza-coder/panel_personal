<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Personal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>🧠 Mi Panel</h2>
    <nav>
      <button data-seccion="calendario">📅 Calendario</button>
      <button data-seccion="tareas">✅ Tareas</button>
      <button data-seccion="notas">📝 Notas</button>
      <button data-seccion="habitos">🔁 Hábitos</button>
      <button data-seccion="gastos">💸 Gastos</button>
      <hr>
      <button id="toggleTema">🌙 Cambiar tema</button>
      <button id="btnLogout" class="logout">🚪 Salir</button>
    </nav>
  </aside>

  <!-- CONTENIDO -->
  <main class="contenido">
    <section id="calendario" class="seccion">
  <h1>📅 Calendario</h1>

  <div id="calendar"></div>

</section>

    <!-- TAREAS -->
    <section id="tareas" class="seccion activa">
      <h1>✅ Tareas</h1>
      <input type="text" id="nuevaTarea" placeholder="Nueva tarea">
      <button id="btnAgregarTarea">Agregar</button>
      <ul id="listaTareas"></ul>
    </section>

    <!-- NOTAS -->
    <section id="notas" class="seccion">
      <h1>📝 Notas</h1>

      <button id="btnAgregarNota">Agregar Nota</button>
  <textarea id="nuevaNota"></textarea>
  <div class="colores-postit">
    <span data-color="#fde68a"></span>
    <span data-color="#bbf7d0"></span>
    <span data-color="#bfdbfe"></span>
    <span data-color="#fecaca"></span>
    <span data-color="#fbcfe8"></span>
</div>
<div id="listaNotas"></div>
    </section>

    <!-- HABITOS -->
    <section id="habitos" class="seccion">
      <h1>🔁 Hábitos</h1>
      <input type="text" id="nuevoHabito">
      <button id="btnAgregarHabito">Agregar</button>
      <ul id="listaHabitos"></ul>
    </section>

    <!-- GASTOS -->
   <div id="gastos" class="seccion">
  <h1>💰 Gastos</h1>

  <label>Motivo</label>
  <input type="text" id="gastoMotivo" placeholder="Tipo de gasto" />

  <label>Monto</label>
     
  <div class="input-dinero">
    <span>$</span>
    <input type="number" id="gastoMonto" placeholder="0.00" />
    <label>Tipo</label>
<select id="gastoTipo">
  <option value="egreso">Egreso</option>
  <option value="ingreso">Ingreso</option>
</select>
  </div>
  
  <button id="btnAgregarGasto" type="button">Agregar</button>
  <div class="card-total">
  <input type="month" id="filtroMes">

  <p>Ingresos: <strong id="totalIngresos">$0</strong></p>
  <p>Egresos: <strong id="totalEgresos">$0</strong></p>
  <hr>
  <p>Balance: <strong id="balanceFinal">$0</strong></p>
</div>

  <ul id="listaGastos"></ul>
    <div class="grafico-container">
     <canvas id="graficoGastos"></canvas>
    </div>
</div>
  </main>
</div>

<!-- SCRIPTS SIEMPRE ABAJO -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/dashboard.js"></script>
<script type="module" src="js/tareas.js"></script>
<script type="module" src="js/notas.js"></script>
<script type="module" src="js/habitos.js"></script>
<script type="module" src="js/gastos.js"></script>
<script type="module" src="js/theme.js"></script>
<script type="module" src="js/calendario.js"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

</body>
</html>
