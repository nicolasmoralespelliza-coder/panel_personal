<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Personal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>🧠 Mi Panel</h2>
    <nav>
      <button data-seccion="tareas">✅ Tareas</button>
      <button data-seccion="notas">📝 Notas</button>
      <button data-seccion="habitos">🔁 Hábitos</button>
      <button data-seccion="gastos">💸 Gastos</button>
      <hr>
      <button id="toggleTema">🌙 Cambiar tema</button>
      <button id="btnLogout" class="logout">🚪 Salir</button>
    </nav>
  </aside>

  <!-- CONTENIDO -->
  <main class="contenido">

    <!-- TAREAS -->
    <section id="tareas" class="seccion activa">
      <h1>✅ Tareas</h1>
      <input type="text" id="nuevaTarea" placeholder="Nueva tarea">
      <button id="btnAgregarTarea">Agregar</button>
      <ul id="listaTareas"></ul>
    </section>

    <!-- NOTAS -->
    <section id="notas" class="seccion">
      <h1>📝 Notas</h1>

      <button id="btnAgregarNota">Agregar Nota</button>
  <textarea id="nuevaNota"></textarea>
  <div class="colores-postit">
    <span data-color="#fde68a"></span>
    <span data-color="#bbf7d0"></span>
    <span data-color="#bfdbfe"></span>
    <span data-color="#fecaca"></span>
    <span data-color="#fbcfe8"></span>
</div>
<div id="listaNotas"></div>
    </section>

    <!-- HABITOS -->
    <section id="habitos" class="seccion">
      <h1>🔁 Hábitos</h1>
      <input type="text" id="nuevoHabito">
      <button id="btnAgregarHabito">Agregar</button>
      <ul id="listaHabitos"></ul>
    </section>

    <!-- GASTOS -->
    <section id="gastos" class="seccion">
      <h1>💸 Gastos</h1>
      <input type="text" id="concepto">
      <input type="number" id="monto">
      <button id="btnAgregarGasto">Agregar</button>
      <ul id="listaGastos"></ul>
    </section>

  </main>
</div>

<!-- SCRIPTS SIEMPRE ABAJO -->
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/dashboard.js"></script>
<script type="module" src="js/tareas.js"></script>
<script type="module" src="js/notas.js"></script>
<script type="module" src="js/habitos.js"></script>
<script type="module" src="js/gastos.js"></script>
<script type="module" src="js/theme.js"></script>

</body>
</html>
